name: release

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write
  deployments: write

jobs:
  desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            task: packageDmg
            artifact-name: minesweeper-macos
            artifact-path: desktop/build/compose/binaries/main/dmg/*.dmg
          - os: windows-latest
            task: packageMsi
            artifact-name: minesweeper-windows
            artifact-path: desktop/build/compose/binaries/main/msi/*.msi
          - os: ubuntu-latest
            task: packageDeb
            artifact-name: minesweeper-linux-deb
            artifact-path: desktop/build/compose/binaries/main/deb/*.deb

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build native installer
        shell: bash
        run: ./gradlew :desktop:${{ matrix.task }} --stacktrace

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-path }}
          if-no-files-found: error

      - name: Attach to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact-path }}
          fail_on_unmatched_files: true

  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build unsigned release APK
        run: ./gradlew :android:assembleRelease --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: minesweeper-android-unsigned
          path: android/build/outputs/apk/release/*.apk
          if-no-files-found: error

      - name: Attach to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: android/build/outputs/apk/release/*.apk
          fail_on_unmatched_files: true

  ios:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

      - name: Build unsigned .ipa
        run: ./gradlew :ios:buildIpa --stacktrace

      - name: Upload .ipa
        uses: actions/upload-artifact@v4
        with:
          name: minesweeper-ios-unsigned
          path: ios/build/ios/ipa/*.ipa
          if-no-files-found: error

      - name: Attach to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: ios/build/ios/ipa/*.ipa
          fail_on_unmatched_files: true

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build web distribution
        run: ./gradlew :web:wasmJsBrowserDistribution --stacktrace

      - name: Deploy to Cloudflare Pages
        if: github.event_name == 'release'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy web/build/dist/wasmJs/productionExecutable --project-name=${{ vars.CLOUDFLARE_PROJECT_NAME }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

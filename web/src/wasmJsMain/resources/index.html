<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minesweeper</title>
    <style>
        /*
         * Reset to a full-bleed canvas. Compose for Web measures itself against the
         * `<body>` element it mounts into, so giving the body a fixed 100% size
         * lets Compose's BoxWithConstraints / fillMaxSize behave the same as on
         * desktop.
         */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #1b1b1f;
            font-family: Tahoma, Verdana, "Liberation Sans", "Helvetica Neue", Helvetica, Arial, sans-serif;
        }

        /* Loading hint shown until the wasm bundle finishes parsing. */
        #loading {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #b8b8c0;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div id="loading">Loading…</div>

    <script>
        /*
         * Compose Web maps right-click to PointerButton.Secondary so we can flag
         * cells with the mouse, but the browser's default context menu would pop
         * up on top of it. Suppressing `contextmenu` page-wide is the simplest
         * fix — none of our UI uses native context menus anyway.
         */
        window.addEventListener('contextmenu', function (e) { e.preventDefault(); });
    </script>

    <!--
        The compiled module is emitted as `<moduleName>.js` — by default that's
        the Gradle project name (`web`), which keeps the convention plugin's
        `outputModuleName.set(project.name)` predictable across modules. The
        loader automatically pulls the matching `.wasm` from the same directory.
    -->
    <script type="application/javascript" src="web.js"></script>
</body>
</html>
